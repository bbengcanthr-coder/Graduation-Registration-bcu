<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบขึ้นทะเบียนบัณฑิต | มหาวิทยาลัยเบงจันทร์</title>
    <!-- นำเข้าฟอนต์ Prompt แบบไม่มีหัว -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy-blue: #0B2447; /* สีกรมเข้ม */
            --navy-light: #19376D;
            --bg-color: #F8FAFC; /* ปรับพื้นหลังนอกกรอบให้เป็นสีเทาอ่อนมาก ๆ เพื่อให้กรอบฟอร์มดูเด่นและคลีนขึ้น */
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: #FFFFFF;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(11, 36, 71, 0.06);
            border-top: 6px solid var(--navy-blue);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--navy-blue);
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .badge-container {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .badge {
            background-color: #F1F5F9;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--navy-light);
            font-weight: 500;
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--navy-blue);
        }

        input[type="text"], 
        input[type="number"], 
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
            background-color: #FCFDFE;
            color: var(--text-main);
        }

        input:focus, select:focus {
            border-color: var(--navy-blue);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(11, 36, 71, 0.08);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--navy-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-submit:hover {
            background-color: var(--navy-light);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            background-color: #A0AABF;
            cursor: not-allowed;
            transform: none;
        }

        /* ----- ส่วนแสดงผลสำเร็จ (Success State) ----- */
        #success-state {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .check-icon {
            width: 64px;
            height: 64px;
            background-color: #F0FDF4;
            color: #16A34A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px auto;
        }

        #success-title {
            color: var(--navy-blue);
            margin-bottom: 24px;
            font-size: 1.3rem;
            line-height: 1.4;
        }

        .info-card {
            background-color: #F8FAFC;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            margin-bottom: 24px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border-color);
            font-size: 0.9rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-muted);
            min-width: 90px;
        }

        .info-value {
            color: var(--navy-blue);
            font-weight: 500;
            text-align: right;
            word-break: break-word;
        }

        .success-footer {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .success-footer strong {
            color: var(--navy-blue);
            display: block;
            font-size: 1rem;
            margin-top: 4px;
        }

        .btn-outline {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--navy-blue);
            border: 1px solid var(--navy-blue);
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
        }

        .btn-outline:hover {
            background-color: #F1F5F9;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- หน้าฟอร์มลงทะเบียน -->
        <div id="form-state">
            <div class="header">
                <h1>ระบบขึ้นทะเบียนบัณฑิต</h1>
                <p>มหาวิทยาลัยเบงจันทร์</p>
                <div class="badge-container">
                    <span class="badge">เปิดระบบ: 9 มิ.ย. - 9 ก.ค. 2569</span>
                </div>
            </div>

            <form id="graduation-form">
                <div class="form-group">
                    <label for="fullname">ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" placeholder="ระบุชื่อและนามสกุล" required>
                </div>

                <div class="form-group">
                    <label for="degree-level">ระดับปริญญา</label>
                    <select id="degree-level" required>
                        <option value="" disabled selected>เลือกระดับปริญญา</option>
                        <option value="ปริญญาตรี">ปริญญาตรี</option>
                        <option value="ปริญญาโท">ปริญญาโท (Master's Degree)</option>
                        <option value="ปริญญาเอก">ปริญญาเอก (Doctoral Degree)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="year">ชั้นปี</label>
                    <input type="number" id="year" placeholder="เช่น 4" min="1" max="8" required>
                </div>

                <div class="form-group">
                    <label for="faculty">คณะ</label>
                    <select id="faculty" required>
                        <option value="" disabled selected>เลือกคณะ</option>
                        <option value="คณะวิทยาศาสตร์">คณะวิทยาศาสตร์</option>
                        <option value="คณะวิศวกรรมศาสตร์">คณะวิศวกรรมศาสตร์</option>
                        <option value="คณะแพทยศาสตร์">คณะแพทยศาสตร์</option>
                        <option value="คณะนิเทศศาสตร์">คณะนิเทศศาสตร์</option>
                         <option value="คณะเกษตรศาสตร์">คณะเกษตรศาสตร์</option>
                        <option value="คณะสถาปัตยกรรมศาสตร์และการออกแบบ">คณะสถาปัตยกรรมศาสตร์และการออกแบบ</option>
                        <option value="คณะวิจิตรศิลป์">คณะวิจิตรศิลป์</option>
                        <option value="คณะดุริยางคศาสตร์">คณะดุริยางคศาสตร์</option>
                      <option value="คณะนิติศาสตร์">คณะนิติศาสตร์</option>
                      <option value="คณะมนุษยศาสตร์และสังคมศาสตร์">คณะมนุษยศาสตร์และสังคมศาสตร์</option>
                      <option value="คณะบริหารธุรกิจ">คณะบริหารธุรกิจ</option>
                      <option value="คณครุศาสตร์">คณครุศาสตร์</option>
                      <option value="คณะทันตแพทยศาสตร์">คณะทันตแพทยศาสตร์</option>
                      <option value="คณะทันตแพทยศาสตร์">คณะทันตแพทยศาสตร์</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="major">สาขา</label>
                    <input type="text" id="major" placeholder="ระบุสาขาวิชา" required>
                </div>

                <div class="form-group">
                    <label for="honors">ลำดับเกียรตินิยม (ถ้ามี)</label>
                    <select id="honors">
                        <option value="ไม่มี">ไม่มี</option>
                        <option value="เกียรตินิยมอันดับ 1">เกียรตินิยมอันดับ 1</option>
                        <option value="เกียรตินิยมอันดับ 2">เกียรตินิยมอันดับ 2</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">ยืนยันการขึ้นทะเบียน</button>
            </form>
        </div>

        <!-- หน้าแสดงผลความสำเร็จ (จะแสดงหลังจากกด submit) -->
        <div id="success-state">
            <div class="check-icon">✓</div>
            <!-- ข้อความตรงนี้จะเปลี่ยนไปตามระดับปริญญา -->
            <h2 id="success-title">ท่านขึ้นทะเบียน...เรียบร้อยแล้ว</h2>
            
            <!-- การ์ดสรุปข้อมูล -->
            <div class="info-card">
                <div class="info-row">
                    <span class="info-label">ชื่อ-สกุล</span>
                    <span class="info-value" id="res-fullname">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">ระดับปริญญา</span>
                    <span class="info-value" id="res-degree">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">คณะ</span>
                    <span class="info-value" id="res-faculty">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">สาขา</span>
                    <span class="info-value" id="res-major">-</span>
                </div>
                <div class="info-row" id="row-honors">
                    <span class="info-label">เกียรตินิยม</span>
                    <span class="info-value" id="res-honors">-</span>
                </div>
            </div>

            <p class="success-footer">
                ยินดีด้วยกับความสำเร็จ เจอกันในวันรับปริญญา
                <strong>31 กรกฎาคม 2569</strong>
            </p>

            <button type="button" class="btn-outline" onclick="window.location.reload()">กลับสู่หน้าหลัก</button>
        </div>
    </div>

    <!-- Firebase SDK (Modular V10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDcjUukTSvF8A_5_259m3wFTDJ3-2r8_xM",
  authDomain: "graduation-registration.firebaseapp.com",
  projectId: "graduation-registration",
  storageBucket: "graduation-registration.firebasestorage.app",
  messagingSenderId: "590817320125",
  appId: "1:590817320125:web:91df8eb4a9a523bce1ebd4",
  measurementId: "G-4R198169J7"
};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('graduation-form');
        const submitBtn = document.getElementById('submit-btn');
        const formState = document.getElementById('form-state');
        const successState = document.getElementById('success-state');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.textContent = 'กำลังบันทึกข้อมูล...';
            submitBtn.disabled = true;

            // 1. ดึงข้อมูลจากฟอร์ม
            const fullname = document.getElementById('fullname').value;
            const degreeLevel = document.getElementById('degree-level').value;
            const year = document.getElementById('year').value;
            const faculty = document.getElementById('faculty').value;
            const major = document.getElementById('major').value;
            const honors = document.getElementById('honors').value;

            try {
                // 2. บันทึกลง Firebase Firestore
                await addDoc(collection(db, "registrations"), {
                    fullname: fullname,
                    degreeLevel: degreeLevel,
                    year: year,
                    faculty: faculty,
                    major: major,
                    honors: honors,
                    timestamp: serverTimestamp()
                });

                // 3. คำนวณคำนำหน้าให้ถูกต้องตามระดับปริญญา
                let titleWord = "";
                if (degreeLevel === "ปริญญาตรี") {
                    titleWord = "บัณฑิต";
                } else if (degreeLevel === "ปริญญาโท") {
                    titleWord = "มหาบัณฑิต";
                } else if (degreeLevel === "ปริญญาเอก") {
                    titleWord = "ดุษฎีบัณฑิต";
                }

                // 4. นำข้อมูลไปแสดงในหน้า Success State
                document.getElementById('success-title').innerHTML = `ท่านขึ้นทะเบียน<br><span style="color:#19376D;">${titleWord}</span>เรียบร้อยแล้ว`;
                document.getElementById('res-fullname').textContent = fullname;
                document.getElementById('res-degree').textContent = degreeLevel;
                document.getElementById('res-faculty').textContent = faculty;
                document.getElementById('res-major').textContent = major;
                
                // จัดการเรื่องเกียรตินิยม (ถ้าไม่มีให้ซ่อนบรรทัดนั้นไปเลยเพื่อให้ดูคลีน)
                const honorsRow = document.getElementById('row-honors');
                if (honors === "ไม่มี" || degreeLevel !== "ปริญญาตรี") {
                    honorsRow.style.display = "none";
                } else {
                    document.getElementById('res-honors').textContent = honors;
                    honorsRow.style.display = "flex";
                }

                // 5. สลับหน้าจอ
                formState.style.display = 'none';
                successState.style.display = 'block';

            } catch (error) {
                console.error("Error adding document: ", error);
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่อีกครั้ง');
                submitBtn.textContent = 'ยืนยันการขึ้นทะเบียน';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
