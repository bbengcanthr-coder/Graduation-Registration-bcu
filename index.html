<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบขึ้นทะเบียนบัณฑิต | มหาวิทยาลัยเบงจันทร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy-blue: #0B2447; /* สีกรมเข้ม */
            --navy-light: #19376D;
            --bg-color: #FFFFFF;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: #fff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(11, 36, 71, 0.08);
            border-top: 6px solid var(--navy-blue);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--navy-blue);
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .header .highlight {
            display: inline-block;
            background-color: #F8FAFC;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--navy-light);
            margin-top: 10px;
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--navy-blue);
        }

        input[type="text"], 
        input[type="number"], 
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            background-color: #FAFAFA;
            color: var(--text-main);
        }

        input:focus, select:focus {
            border-color: var(--navy-blue);
            background-color: #FFF;
            box-shadow: 0 0 0 3px rgba(11, 36, 71, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--navy-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--navy-light);
        }

        .btn-submit:disabled {
            background-color: #A0AABF;
            cursor: not-allowed;
        }

        /* ส่วนแสดงผลเมื่อลงทะเบียนสำเร็จ */
        #success-state {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .check-icon {
            width: 60px;
            height: 60px;
            background-color: #E8F5E9;
            color: #2E7D32;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px auto;
        }

        #success-state h2 {
            color: var(--navy-blue);
            margin-bottom: 10px;
        }

        #success-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="form-state">
            <div class="header">
                <h1>ระบบขึ้นทะเบียนบัณฑิต</h1>
                <p>มหาวิทยาลัยเบงจันทร์</p>
                <div class="highlight">เปิดระบบ: 9 มิ.ย. - 9 ก.ค. 2569</div>
                <div class="highlight" style="margin-top: 5px; background: transparent; border: none; color: var(--text-muted);">
                    กำหนดการรับปริญญา: 31 ก.ค. 2569
                </div>
            </div>

            <form id="graduation-form">
                <div class="form-group">
                    <label for="fullname">ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" placeholder="นาย/นางสาว..." required>
                </div>

                <div class="form-group">
                    <label for="degree-level">ระดับปริญญา</label>
                    <select id="degree-level" required>
                        <option value="" disabled selected>เลือกระดับปริญญา</option>
                        <option value="ปริญญาตรี">ปริญญาตรี</option>
                        <option value="ปริญญาโท">ปริญญาโท (Master's Degree)</option>
                        <option value="ปริญญาเอก">ปริญญาเอก (Doctoral Degree)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="year">ชั้นปี</label>
                    <input type="number" id="year" placeholder="เช่น 4" min="1" max="8" required>
                </div>

                <div class="form-group">
                    <label for="faculty">คณะ</label>
                    <select id="faculty" required>
                        <option value="" disabled selected>เลือกคณะ</option>
                        <option value="คณะวิทยาศาสตร์">คณะวิทยาศาสตร์</option>
                        <option value="คณะวิศวกรรมศาสตร์">คณะวิศวกรรมศาสตร์</option>
                        <option value="คณะแพทยศาสตร์">คณะแพทยศาสตร์</option>
                        <option value="คณะนิเทศศาสตร์">คณะนิเทศศาสตร์</option>
                        <option value="คณะเกษตรศาสตร์">คณะเกษตรศาสตร์</option>
                        <option value="คณะสถาปัตยกรรมศาสตร์และการออกแบบ">คณะสถาปัตยกรรมศาสตร์และการออกแบบ</option>
                        <option value="คณะวิจิตรศิลป์">คณะวิจิตรศิลป์</option>
                        <option value="คณะดุริยางคศาสตร์">คณะดุริยางคศาสตร์</option>
                      <option value="คณะนิติศาสตร์">คณะนิติศาสตร์</option>
                      <option value="คณะมนุษยศาสตร์และสังคมศาสตร์">คณะมนุษยศาสตร์และสังคมศาสตร์</option>
                      <option value="คณะบริหารธุรกิจ">คณะบริหารธุรกิจ</option>
                      <option value="คณครุศาสตร์">คณครุศาสตร์</option>
                      <option value="คณะทันตแพทยศาสตร์">คณะทันตแพทยศาสตร์</option>
                      <option value="คณะทันตแพทยศาสตร์">คณะทันตแพทยศาสตร์</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="major">สาขา</label>
                    <input type="text" id="major" placeholder="ระบุสาขาวิชา" required>
                </div>

                <div class="form-group">
                    <label for="honors">ลำดับเกียรตินิยม (ถ้ามี)</label>
                    <select id="honors">
                        <option value="ไม่มี">ไม่มี</option>
                        <option value="เกียรตินิยมอันดับ 1">เกียรตินิยมอันดับ 1</option>
                        <option value="เกียรตินิยมอันดับ 2">เกียรตินิยมอันดับ 2</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">ยืนยันการขึ้นทะเบียน</button>
            </form>
        </div>

        <div id="success-state">
            <div class="check-icon">✓</div>
            <h2>ขึ้นทะเบียนสำเร็จ</h2>
            <p>รายชื่อนี้ขึ้นทะเบียนจบเรียบร้อยแล้ว<br>เจอกันในวันรับปริญญา 31 กรกฎาคม 2569 (จบคอมมู)</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDcjUukTSvF8A_5_259m3wFTDJ3-2r8_xM",
  authDomain: "graduation-registration.firebaseapp.com",
  projectId: "graduation-registration",
  storageBucket: "graduation-registration.firebasestorage.app",
  messagingSenderId: "590817320125",
  appId: "1:590817320125:web:91df8eb4a9a523bce1ebd4",
  measurementId: "G-4R198169J7"
};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('graduation-form');
        const submitBtn = document.getElementById('submit-btn');
        const formState = document.getElementById('form-state');
        const successState = document.getElementById('success-state');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // ป้องกันการรีเฟรชหน้าเว็บ

            // เปลี่ยนสถานะปุ่ม
            submitBtn.textContent = 'กำลังบันทึกข้อมูล...';
            submitBtn.disabled = true;

            // เก็บค่าจากฟอร์ม
            const fullname = document.getElementById('fullname').value;
            const degreeLevel = document.getElementById('degree-level').value;
            const year = document.getElementById('year').value;
            const faculty = document.getElementById('faculty').value;
            const major = document.getElementById('major').value;
            const honors = document.getElementById('honors').value;

            try {
                // บันทึกลง Firestore ในคอลเล็กชันชื่อ "registrations"
                await addDoc(collection(db, "registrations"), {
                    fullname: fullname,
                    degreeLevel: degreeLevel,
                    year: year,
                    faculty: faculty,
                    major: major,
                    honors: honors,
                    timestamp: serverTimestamp()
                });

                // สลับหน้าจอเมื่อบันทึกเสร็จ
                formState.style.display = 'none';
                successState.style.display = 'block';

            } catch (error) {
                console.error("Error adding document: ", error);
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่อีกครั้ง');
                submitBtn.textContent = 'ยืนยันการขึ้นทะเบียน';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
